<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>面试记录跟踪器 - 简单版本</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Additional styles for simple version */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background: #f8fafc; /* 浅蓝白背景 */
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 16px;
        }
        
        header {
            background: linear-gradient(135deg, #1976d2 0%, #0d47a1 100%);
            color: white;
            padding: 16px 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 24px;
        }
        
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        h1 {
            margin: 0;
            font-size: 1.8em;
        }
        
        .subtitle {
            margin: 5px 0 0 0;
            opacity: 0.9;
            font-size: 1.1em;
        }
        
        .btn {
            background: linear-gradient(135deg, #1976d2, #64b5f6);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
            box-shadow: 0 2px 4px rgba(25, 118, 210, 0.2);
        }
        
        .btn:hover {
            background: linear-gradient(135deg, #1565c0, #42a5f5);
            transform: translateY(-1px);
            box-shadow: 0 4px 8px rgba(25, 118, 210, 0.3);
        }
        
        .btn-secondary {
            background: linear-gradient(135deg, #757575, #9e9e9e);
        }
        
        .btn-secondary:hover {
            background: linear-gradient(135deg, #616161, #757575);
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #f44336, #ef5350);
        }
        
        .btn-danger:hover {
            background: linear-gradient(135deg, #d32f2f, #e53935);
        }
        
        .interview-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 16px;
            margin-top: 20px;
        }
        
        .interview-card {
            background: white;
            border-radius: 8px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(25, 118, 210, 0.08);
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid #e3f2fd;
        }
        
        .interview-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 16px rgba(25, 118, 210, 0.12);
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
            border-bottom: 1px solid #e3f2fd;
            padding-bottom: 12px;
        }
        
        .company-name {
            font-size: 1.2em;
            font-weight: 700;
            color: #1976d2;
            margin: 0;
        }
        
        .position {
            color: #1976d2;
            margin: 4px 0;
            font-size: 1em;
            opacity: 0.8;
        }
        
        .status-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 16px;
            font-size: 0.8em;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .status-upcoming {
            background: linear-gradient(135deg, #ff9800, #ffb74d);
            color: white;
        }
        
        .status-completed {
            background: linear-gradient(135deg, #4caf50, #81c784);
            color: white;
        }
        
        .status-cancelled {
            background: linear-gradient(135deg, #f44336, #e57373);
            color: white;
        }
        
        .status-failed {
            background: linear-gradient(135deg, #9c27b0, #ba68c8);
            color: white;
        }
        
        .card-details {
            margin: 12px 0;
        }
        
        .detail-row {
            display: flex;
            margin: 6px 0;
        }
        
        .detail-label {
            font-weight: 600;
            color: #1976d2;
            min-width: 100px;
            font-size: 0.9em;
        }
        
        .detail-value {
            color: #333;
            flex: 1;
            font-size: 0.9em;
        }
        
        .card-actions {
            display: flex;
            gap: 8px;
            margin-top: 16px;
            border-top: 1px solid #e3f2fd;
            padding-top: 12px;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal-content {
            background: white;
            border-radius: 16px;
            width: 90%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            animation: modalSlideIn 0.3s ease-out;
        }
        
        @keyframes modalSlideIn {
            from { opacity: 0; transform: translateY(-50px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .modal-header {
            background: linear-gradient(135deg, #1976d2 0%, #0d47a1 100%);
            color: white;
            padding: 20px;
            border-radius: 16px 16px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-title {
            margin: 0;
            font-size: 1.5em;
        }
        
        .close-modal {
            background: none;
            border: none;
            color: white;
            font-size: 1.5em;
            cursor: pointer;
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }
        
        .close-modal:hover {
            background: rgba(255,255,255,0.2);
        }
        
        .modal-body {
            padding: 25px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        
        .form-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
            box-sizing: border-box;
        }
        
        .form-input:focus {
            border-color: #1976d2;
            outline: none;
            box-shadow: 0 0 0 3px rgba(25, 118, 210, 0.1);
        }
        
        .textarea {
            min-height: 120px;
            resize: vertical;
            font-family: inherit;
        }
        
        .timeline-item {
            background: #f8f9fa;
            border-left: 4px solid #1976d2;
            margin-bottom: 10px;
            padding: 12px 15px;
            border-radius: 0 8px 8px 0;
        }
        
        .timeline-time {
            font-weight: 600;
            color: #1976d2;
            margin-bottom: 5px;
        }
        
        .timeline-content {
            color: #333;
        }
        
        .add-timeline-btn {
            background: #e3f2fd;
            color: #1976d2;
            border: 2px dashed #1976d2;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            margin-top: 10px;
            transition: all 0.3s;
        }
        
        .add-timeline-btn:hover {
            background: #bbdefb;
        }
        
        .filter-tabs {
            display: flex;
            gap: 8px;
            margin: 16px 0;
            background: white;
            padding: 8px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(25, 118, 210, 0.08);
            border: 1px solid #e3f2fd;
        }
        
        .filter-tab {
            padding: 8px 16px;
            border: none;
            background: #f0f7ff;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9em;
            color: #1976d2;
            transition: all 0.2s;
        }
        
        .filter-tab.active {
            background: linear-gradient(135deg, #1976d2, #64b5f6);
            color: white;
        }
        
        .filter-tab:hover {
            background: #e3f2fd;
        }
        
        .filter-tab.active:hover {
            background: linear-gradient(135deg, #1565c0, #42a5f5);
        }
        
        .filter-add-btn {
            padding: 8px 12px;
            border: none;
            background: linear-gradient(135deg, #4caf50, #66bb6a);
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1em;
            color: white;
            transition: all 0.2s;
            margin: 0 2px;
        }
        
        .filter-add-btn:hover {
            background: linear-gradient(135deg, #43a047, #57a85b);
            transform: scale(1.05);
        }

        .filter-group {
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .filter-subtabs {
            display: flex;
            gap: 4px;
            margin-left: 8px;
            flex-wrap: wrap;
        }

        .filter-subtab {
            padding: 4px 8px;
            border: none;
            background: #e8f4fe;
            border-radius: 3px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.8em;
            color: #1976d2;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .filter-subtab:hover {
            background: #d1e9ff;
        }

        .filter-subtab.active {
            background: linear-gradient(135deg, #1976d2, #64b5f6);
            color: white;
        }

        .filter-subtab.active:hover {
            background: linear-gradient(135deg, #1565c0, #42a5f5);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        
        .empty-icon {
            font-size: 4em;
            color: #bdbdbd;
            margin-bottom: 20px;
        }
        
        .empty-message {
            font-size: 1.2em;
            margin-bottom: 15px;
        }
        
        @media (max-width: 768px) {
            .interview-list {
                grid-template-columns: 1fr;
            }
            
            .header-content {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
            
            .filter-tabs {
                flex-wrap: wrap;
            }
        }

        /* Group styling for position grouping */
        .position-group {
            margin-bottom: 30px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
            overflow: hidden;
            border: 1px solid #e0e0e0;
        }

        .group-header {
            background: linear-gradient(135deg, #f5f7fa 0%, #e3e8f0 100%);
            padding: 20px;
            border-bottom: 2px solid #1976d2;
        }

        .group-company {
            margin: 0 0 5px 0;
            font-size: 1.6em;
            color: #1976d2;
        }

        .group-position {
            margin: 0 0 10px 0;
            font-size: 1.2em;
            color: #555;
        }

        .group-count {
            display: inline-block;
            background: #1976d2;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: 600;
        }

        .group-interviews {
            padding: 15px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }

        .group-interviews .interview-card {
            margin: 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            border: 1px solid #eee;
            padding: 12px;
        }

        .group-interviews .interview-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.12);
        }

        .group-interviews .company-name,
        .group-interviews .position {
            font-size: 0.9em;
            color: #666;
        }

        .group-interviews .company-name {
            font-size: 1em;
            color: #333;
        }

        .group-interviews .detail-row {
            font-size: 0.85em;
            margin-bottom: 6px;
        }

        .group-interviews .card-actions {
            margin-top: 10px;
        }

        .group-interviews .btn {
            padding: 5px 10px;
            font-size: 0.85em;
        }

        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .btn-export {
            background: linear-gradient(135deg, #4caf50, #2e7d32);
            color: white;
            border: none;
        }

        .btn-export:hover {
            background: linear-gradient(135deg, #43a047, #1b5e20);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3);
        }
        /* Dashboard styles - Ultra Compact */
        .dashboard {
            background: white;
            border-radius: 6px;
            padding: 12px;
            margin: 8px 0 12px 0;
            box-shadow: 0 2px 8px rgba(25, 118, 210, 0.08);
            border: 1px solid #e3f2fd;
        }
        
        .dashboard h2 {
            margin-top: 0;
            color: #1976d2;
            font-size: 1.2em;
            border-bottom: 1px solid #e3f2fd;
            padding-bottom: 8px;
            margin-bottom: 12px;
        }
        
        .dashboard-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        
        @media (max-width: 768px) {
            .dashboard-content {
                grid-template-columns: 1fr;
                gap: 12px;
            }
        }
        
        .dashboard-section h3 {
            color: #1976d2;
            font-size: 1em;
            margin-bottom: 8px;
            font-weight: 600;
        }
        
        .stats-container {
            background: #f8fafc;
            border-radius: 6px;
            padding: 12px;
            min-height: 120px;
            border: 1px solid #e3f2fd;
        }
        
        .phase-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: 1px solid #e3f2fd;
        }
        
        .phase-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        
        .phase-label {
            font-weight: 600;
            color: #1976d2;
            font-size: 0.9em;
            min-width: 70px;
        }
        
        .phase-bar-container {
            flex: 1;
            margin: 0 8px;
            height: 6px;
            background: #e3f2fd;
            border-radius: 3px;
            overflow: hidden;
        }
        
        .phase-bar {
            height: 100%;
            border-radius: 3px;
            transition: width 0.5s ease;
            background-color: inherit;
        }
        
        .phase-percentage {
            font-weight: 700;
            color: #1976d2;
            min-width: 40px;
            text-align: right;
            font-size: 0.85em;
        }
        
        .position-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            padding: 6px 8px;
            background: white;
            border-radius: 4px;
            border-left: 3px solid #1976d2;
            border: 1px solid #e3f2fd;
        }
        
        .position-name {
            font-weight: 600;
            color: #1976d2;
            font-size: 0.9em;
        }
        
        .position-count {
            background: linear-gradient(135deg, #1976d2, #64b5f6);
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.8em;
            font-weight: 600;
        }
        
        .loading {
            text-align: center;
            color: #90a4ae;
            padding: 20px 0;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <div>
                <h1>求职追踪</h1>
            </div>
            <div class="header-actions">
                <button class="btn btn-export" id="exportBtn">📥 导出数据</button>
                <button class="btn" id="addDeliveryBtn">+ 添加投递记录</button>
                <button class="btn" id="addInterviewBtn">+ 添加面试记录</button>
            </div>
        </div>
    </header>
    
    <div class="container">
        <div id="dashboard" class="dashboard">
            <div class="dashboard-section">
                <h2>求职进度看板</h2>
                <div class="dashboard-content">
                    <div class="phase-stats">
                        <h3>各环节进度</h3>
                        <div id="phaseStats" class="stats-container">
                            <!-- 各环节百分比将动态生成 -->
                            <div class="loading">加载中...</div>
                        </div>
                    </div>
                    <div class="position-distribution">
                        <h3>岗位分布</h3>
                        <div id="positionStats" class="stats-container">
                            <!-- 岗位分布将动态生成 -->
                            <div class="loading">加载中...</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="filter-tabs">
            <button class="filter-tab active" data-filter="all">全部</button>
            <button class="filter-tab" data-filter="已投递">已投递</button>
            <button class="filter-add-btn" id="quickAddDeliveryBtn" title="快速添加投递记录">+</button>
            <button class="filter-tab" data-filter="笔试中">笔试中</button>
            <div class="filter-group">
                <button class="filter-tab" data-filter="面试中">面试中</button>
                <div class="filter-subtabs">
                    <button class="filter-subtab" data-filter="面试中-upcoming">即将面试</button>
                    <button class="filter-subtab" data-filter="面试中-completed">已完成</button>
                    <button class="filter-subtab" data-filter="面试中-cancelled">已取消</button>
                    <button class="filter-subtab" data-filter="面试中-failed">未通过</button>
                </div>
            </div>
            <button class="filter-tab" data-filter="已offer">已offer</button>
            <button class="filter-tab" data-filter="已结束">已结束</button>
        </div>
        
        <div id="interviewList" class="interview-list">
            <!-- Interviews will be loaded here -->
            <div class="empty-state">
                <div class="empty-icon">📋</div>
                <div class="empty-message">暂无面试记录</div>
                <p>点击"添加面试记录"创建第一个面试记录</p>
            </div>
        </div>
    </div>
    
    <!-- Add/Edit Interview Modal -->
    <div id="interviewModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">添加面试记录</h2>
                <button class="close-modal" id="closeModalBtn">×</button>
            </div>
            <div class="modal-body">
                <form id="interviewForm">
                    <input type="hidden" id="interviewId">
                    
                    <div class="form-group">
                        <label class="form-label" for="company">公司 *</label>
                        <input type="text" id="company" class="form-input" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="position">职位 *</label>
                        <input type="text" id="position" class="form-input" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="date">日期 *</label>
                        <input type="date" id="date" class="form-input" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="time">时间 *</label>
                        <input type="time" id="time" class="form-input" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="duration">时长（分钟） *</label>
                        <input type="number" id="duration" class="form-input" min="5" max="480" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="interviewer">面试官</label>
                        <input type="text" id="interviewer" class="form-input" placeholder="例如：张三、李四">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="round">第几面 *</label>
                        <select id="round" class="form-input" required>
                            <option value="一面">一面</option>
                            <option value="二面">二面</option>
                            <option value="三面">三面</option>
                            <option value="四面及以上">四面及以上</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="passed">是否通过 *</label>
                        <select id="passed" class="form-input" required>
                            <option value="待定">待定</option>
                            <option value="通过">通过</option>
                            <option value="未通过">未通过</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="phase">阶段 *</label>
                        <select id="phase" class="form-input" required>
                            <option value="已投递">已投递</option>
                            <option value="笔试中">笔试中</option>
                            <option value="面试中" selected>面试中</option>
                            <option value="已offer">已offer</option>
                            <option value="已结束">已结束</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="status">面试状态 *</label>
                        <select id="status" class="form-input" required>
                            <option value="upcoming">即将进行</option>
                            <option value="completed">已完成</option>
                            <option value="cancelled">已取消</option>
                            <option value="failed">未通过</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="notes">面试记录</label>
                        <textarea id="notes" class="form-input textarea" placeholder="记录面试过程中的关键点、问题等..."></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="reflection">面试复盘</label>
                        <textarea id="reflection" class="form-input textarea" placeholder="面试后的反思、收获、改进点等..."></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">时间线</label>
                        <div id="timelineContainer">
                            <!-- Timeline items will be added here -->
                        </div>
                        <div class="add-timeline-btn" id="addTimelineBtn">+ 添加时间线条目</div>
                    </div>
                    
                    <div class="form-group" style="margin-top: 30px;">
                        <button type="submit" class="btn" style="width: 100%; padding: 15px; font-size: 1.1em;">保存面试记录</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <!-- Add Delivery Record Modal -->
    <div id="deliveryModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">添加投递记录</h2>
                <button class="close-modal" id="closeDeliveryModalBtn">×</button>
            </div>
            <div class="modal-body">
                <form id="deliveryForm">
                    <div class="form-group">
                        <label class="form-label" for="deliveryCompany">公司 *</label>
                        <input type="text" id="deliveryCompany" class="form-input" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="deliveryPosition">岗位 *</label>
                        <input type="text" id="deliveryPosition" class="form-input" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="deliveryDate">投递时间 *</label>
                        <input type="datetime-local" id="deliveryDate" class="form-input" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="deliveryPhase">阶段 *</label>
                        <select id="deliveryPhase" class="form-input" required>
                            <option value="已投递">已投递</option>
                            <option value="笔试中">笔试中</option>
                            <option value="面试中">面试中</option>
                            <option value="已offer">已offer</option>
                            <option value="已结束">已结束</option>
                        </select>
                    </div>
                    
                    <div class="form-group" style="margin-top: 30px;">
                        <button type="submit" class="btn" style="width: 100%; padding: 12px; font-size: 1em;">保存投递记录</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <!-- Timeline Item Template (hidden) -->
    <template id="timelineTemplate">
        <div class="timeline-item">
            <div class="timeline-time">
                <input type="text" class="timeline-time-input form-input" placeholder="例如：14:30 - 自我介绍" style="margin-bottom: 5px;">
            </div>
            <div class="timeline-content">
                <textarea class="timeline-content-input form-input textarea" placeholder="此面试环节的详细信息..." rows="2"></textarea>
            </div>
            <button type="button" class="btn btn-danger remove-timeline-btn" style="margin-top: 10px; padding: 8px 16px;">删除</button>
        </div>
    </template>
    
    <script src="db.js"></script>
    <script src="simple-app.js"></script>
</body>
</html>
